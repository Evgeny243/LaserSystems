<style>
/* ── Design tokens ──────────────────────────────────────────────────────── */

<!-- ── Main application script ─────────────────────────────────────────── -->
<script>
// ── Fixed axis limits — hardcoded, never change ───────────────────────────
var X_MIN = 1,      X_MAX = 1e8;
var Y_MIN = 1e-1,   Y_MAX = 1e11;

var GRAPH_SCOPES = ["Files.Read.All", "Sites.Read.All"];
var GRAPH_BASE   = "https://graph.microsoft.com/v1.0";

var currentAccount = null;
var driveId        = null;   // cached after first load
var siteId         = null;

// traceMap: filename → {x, y, color} for currently plotted traces
var traceMap = {};
var colorIdx = 0;
var COLORS = [
  '#1a56a0','#c0392b','#27ae60','#8e44ad',
  '#d35400','#16a085','#c0392b','#2980b9',
  '#f39c12','#1abc9c','#e74c3c','#9b59b6',
];

// ── MSAL ──────────────────────────────────────────────────────────────────
var msalInstance = null;

window.addEventListener('load', function() {
  try {
    console.log('window loaded');
    console.log('msal object:', typeof msal);
    console.log('msal.PublicClientApplication:', typeof msal?.PublicClientApplication);
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId:    CONFIG.clientId,
        authority:   "https://login.microsoftonline.com/" + CONFIG.tenantId,
        redirectUri: window.location.href.split('?')[0],
      },
      cache: { cacheLocation: "sessionStorage" },
    });
    msalInstance.handleRedirectPromise().catch(function(){});
    setStatus('Ready — sign in to load files');
  } catch(e) {
    setStatus('MSAL init failed: ' + e.message);
  }
});

// ── Auth ──────────────────────────────────────────────────────────────────
async function handleSignIn() {
  if (!msalInstance) { showToast('App still initializing — please wait a moment.', true); return; }
  try {
    const resp = await msalInstance.loginPopup({ scopes: GRAPH_SCOPES });
    currentAccount = resp.account;
    setStatus(`Signed in as ${currentAccount.username}`);
    document.getElementById('btn-signin').textContent = `Sign out (${currentAccount.username.split('@')[0]})`;
    document.getElementById('btn-signin').classList.add('signed-in');
    document.getElementById('btn-signin').onclick = handleSignOut;
    document.getElementById('folder-path-input').value = CONFIG.folderPath;
    loadFileTree();
  } catch(e) {
    if (!e.message?.includes('user_cancelled')) showToast('Sign-in failed: ' + e.message, true);
  }
}

function handleSignOut() {
  msalInstance.logoutPopup({ account: currentAccount });
  currentAccount = null;
  driveId = null; siteId = null;
  document.getElementById('btn-signin').textContent = 'Sign in with Microsoft';
  document.getElementById('btn-signin').classList.remove('signed-in');
  document.getElementById('btn-signin').onclick = handleSignIn;
  document.getElementById('file-list').innerHTML =
    '<div class="empty-state">Sign in and load a folder<br>to see data files.</div>';
  setStatus('Not signed in');
}

async function getToken() {
  const req = { scopes: GRAPH_SCOPES, account: currentAccount };
  try {
    return (await msalInstance.acquireTokenSilent(req)).accessToken;
  } catch {
    return (await msalInstance.acquireTokenPopup(req)).accessToken;
  }
}

async function graphGet(url) {
  const token = await getToken();
  const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error(`Graph API ${r.status}: ${await r.text()}`);
  return r.json();
}

// ── Drive resolution (cached) ─────────────────────────────────────────────
async function ensureDrive() {
  if (driveId) return;
  const hostname = new URL(CONFIG.siteUrl).hostname;
  const sitePath = new URL(CONFIG.siteUrl).pathname.replace(/^\//, '');
  const siteData = await graphGet(`${GRAPH_BASE}/sites/${hostname}:/${sitePath}`);
  siteId = siteData.id;
  const drivesData = await graphGet(`${GRAPH_BASE}/sites/${siteId}/drives`);
  const drive = drivesData.value.find(d =>
    d.webUrl && d.webUrl.toLowerCase().includes('/shared%20documents')
  ) || drivesData.value.find(d => d.name === 'Documents')
    || drivesData.value.find(d => d.driveType === 'documentLibrary');
  driveId = drive.id;
}

// Convert CONFIG folderPath → drive-relative path
function toDrivePath(folderPath) {
  const siteName = new URL(CONFIG.siteUrl).pathname;
  const prefixes = [siteName + '/Shared Documents', siteName + '/Documents'];
  for (const p of prefixes) {
    if (folderPath.toLowerCase().startsWith(p.toLowerCase()))
      return folderPath.slice(p.length) || '/';
  }
  return folderPath;
}

// Fetch children of a drive path, returns {folders, files}
async function fetchChildren(drivePath) {
  await ensureDrive();
  const url = (drivePath && drivePath !== '/')
    ? `${GRAPH_BASE}/drives/${driveId}/root:${encodeURI(drivePath)}:/children`
    : `${GRAPH_BASE}/drives/${driveId}/root/children`;
  const data = await graphGet(url);
  const folders = [], files = [];
  for (const item of data.value) {
    if (item.folder) {
      folders.push({ name: item.name, path: drivePath.replace(/\/$/, '') + '/' + item.name });
    } else if (item.file && !item.name.includes('.')) {
      files.push({
        name: item.name,
        downloadUrl: item['@microsoft.graph.downloadUrl'],
        size: item.size,
        modified: item.lastModifiedDateTime?.slice(0, 10) ?? '',
        path: drivePath.replace(/\/$/, '') + '/' + item.name,
      });
    }
  }
  folders.sort((a, b) => a.name.localeCompare(b.name));
  files.sort((a, b) => a.name.localeCompare(b.name));
  return { folders, files };
}

// ── Tree rendering ────────────────────────────────────────────────────────
async function loadFileTree() {
  if (!currentAccount) { showToast('Please sign in first.', true); return; }
  const rootPath = toDrivePath(
    document.getElementById('folder-path-input').value.trim() || CONFIG.folderPath
  );
  setStatus('<span class="spinner"></span>Loading…');
  const el = document.getElementById('file-list');
  el.innerHTML = '<div class="empty-state"><span class="spinner"></span>Fetching…</div>';
  try {
    const container = document.createElement('div');
    await renderTreeNode(container, rootPath, 0);
    el.innerHTML = '';
    el.appendChild(container);
    const count = el.querySelectorAll('.file-item').length;
    setStatus(`Loaded — ${count} file(s) found`);
  } catch(e) {
    setStatus('Error loading files');
    showToast('Failed: ' + e.message, true);
    el.innerHTML = `<div class="empty-state" style="color:#c0392b">Error: ${e.message}</div>`;
  }
}

async function renderTreeNode(container, drivePath, depth) {
  const { folders, files } = await fetchChildren(drivePath);

  // Render files at this level
  for (const f of files) {
    const item = document.createElement('div');
    item.className = 'file-item tree-node';
    item.style.paddingLeft = (14 + depth * 0) + 'px';
    item.dataset.path = f.path;
    item.dataset.downloadUrl = f.downloadUrl;
    item.dataset.name = f.name;
    const isPlotted = !!traceMap[f.path];
    if (isPlotted) item.classList.add('checked');
    item.innerHTML = `
      <input type="checkbox" ${isPlotted ? 'checked' : ''} onclick="event.stopPropagation()"/>
      <div>
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${formatBytes(f.size)} · ${f.modified}</div>
      </div>`;
    item.addEventListener('click', () => onFileToggle(item, f));
    item.querySelector('input').addEventListener('change', () => onFileToggle(item, f));
    container.appendChild(item);
  }

  // Render subfolders
  for (const folder of folders) {
    const folderEl = document.createElement('div');
    folderEl.className = 'tree-node';

    const header = document.createElement('div');
    header.className = 'tree-folder';
    header.innerHTML = `<span class="arrow">▶</span><span class="folder-icon">📁</span><span>${folder.name}</span>`;
    folderEl.appendChild(header);

    const children = document.createElement('div');
    children.className = 'tree-children';
    children.style.marginLeft = (14 + depth * 4) + 'px';
    folderEl.appendChild(children);

    let loaded = false;
    header.addEventListener('click', async () => {
      const isOpen = header.classList.toggle('open');
      children.classList.toggle('open', isOpen);
      if (isOpen && !loaded) {
        loaded = true;
        children.innerHTML = '<div class="empty-state" style="padding:8px 14px"><span class="spinner"></span></div>';
        try {
          await renderTreeNode(children, folder.path, depth + 1);
        } catch(e) {
          children.innerHTML = `<div class="empty-state" style="color:#c0392b;padding:6px 14px">Error: ${e.message}</div>`;
        }
      }
    });

    container.appendChild(folderEl);
  }
}

// ── Live toggle ───────────────────────────────────────────────────────────
async function onFileToggle(item, f) {
  const cb = item.querySelector('input[type=checkbox]');
  const shouldAdd = !traceMap[f.path];
  cb.checked = shouldAdd;
  item.classList.toggle('checked', shouldAdd);

  if (shouldAdd) {
    item.classList.add('loading');
    try {
      const resp = await fetch(f.downloadUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      const { x, y } = parseFile(text, f.name);
      const color = COLORS[colorIdx % COLORS.length];
      colorIdx++;
      traceMap[f.path] = { x, y, name: f.name, color };
    } catch(e) {
      showToast(`Failed to load ${f.name}: ${e.message}`, true);
      cb.checked = false;
      item.classList.remove('checked');
    }
    item.classList.remove('loading');
  } else {
    delete traceMap[f.path];
  }
  updatePlot();
}

function selectAll() {
  // Select all visible files
  document.querySelectorAll('.file-item').forEach(item => {
    if (!traceMap[item.dataset.path]) {
      const f = { path: item.dataset.path, downloadUrl: item.dataset.downloadUrl, name: item.dataset.name };
      onFileToggle(item, f);
    }
  });
}

function clearAll() {
  document.querySelectorAll('.file-item').forEach(item => {
    const cb = item.querySelector('input[type=checkbox]');
    if (cb) cb.checked = false;
    item.classList.remove('checked');
  });
  traceMap = {};
  colorIdx = 0;
  updatePlot();
}

// ── Plot update ───────────────────────────────────────────────────────────
function getLayout(showLegend) {
  const title = document.getElementById('plot-title-input').value.trim()
    || 'Phase Noise (by OEwaves Linewidth Analyzer)';
  return {
    paper_bgcolor: '#ffffff',
    plot_bgcolor:  '#ffffff',
    font:  { family: "'JetBrains Mono', monospace", color: '#222222', size: 11 },
    title: {
      text: title,

}

function updatePlot() {
  const traceList = Object.values(traceMap).map(t => ({
    x: t.x, y: t.y,
    type: 'scatter', mode: 'lines',
    name: t.name,
    line: { color: t.color, width: 1.2 },
    hovertemplate: '<b>%{fullData.name}</b><br>f = %{x:.3g} Hz<br>S = %{y:.3g} Hz²/Hz<extra></extra>',
  }));

  const plotConfig = {
    responsive: true, displayModeBar: true,
    modeBarButtonsToRemove: ['select2d','lasso2d'],
    displaylogo: false,
    toImageButtonOptions: { format: 'png', width: 1400, height: 800, scale: 2 },
  };

  Plotly.react('plot-div', traceList, getLayout(traceList.length > 1), plotConfig);
  document.getElementById('btn-download').disabled = traceList.length === 0;
  setStatus(traceList.length > 0 ? `${traceList.length} trace(s) plotted` : 'Signed in — browse files to plot');
}

function clearPlot() {
  clearAll();
}

// ── File parsing ──────────────────────────────────────────────────────────
function parseFile(text, filename) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  let dataStart = 0, colFreq = 0, colFN = 3;

  for (let i = 0; i < Math.min(lines.length, 30); i++) {
    const parts = lines[i].split('\t');
    if (parts.length >= 4 && isNaN(parseFloat(parts[0]))) {
      const headers = parts.map(h => h.trim().toLowerCase());
      const fIdx = headers.findIndex(h => h.includes('frequency') && !h.includes('noise'));
      const nIdx = headers.findIndex(h => h.includes('hz^2') || h.includes('hz²') || h.includes('hz2/hz'));
      if (fIdx >= 0) colFreq = fIdx;
      if (nIdx >= 0) colFN   = nIdx;
      dataStart = i + 1;
      break;
    }
    if (parts.length >= 4 && !isNaN(parseFloat(parts[0]))) { dataStart = i; break; }
  }

  const xVals = [], yVals = [];
  for (let i = dataStart; i < lines.length; i++) {
    const parts = lines[i].split('\t');
    if (parts.length <= Math.max(colFreq, colFN)) continue;
    const x = parseFloat(parts[colFreq]);
    const y = parseFloat(parts[colFN]);
    if (isFinite(x) && isFinite(y) && x > 0 && y > 0) { xVals.push(x); yVals.push(y); }
  }
  if (!xVals.length) throw new Error(`No valid X/Y data found in ${filename}`);
  return { x: xVals, y: yVals };
}

// ── PNG download ──────────────────────────────────────────────────────────
async function downloadPNG() {
  if (!Object.keys(traceMap).length) return;
  const title = document.getElementById('plot-title-input').value.trim() || 'phase_noise';
  try {
    await Plotly.downloadImage('plot-div', {
      format: 'png', width: 1400, height: 800, scale: 2,
      filename: title.replace(/\s+/g, '_'),
    });
  } catch(e) { showToast('Download failed: ' + e.message, true); }
}

// ── Utilities ─────────────────────────────────────────────────────────────
function setStatus(html) { document.getElementById('status-bar').innerHTML = html; }
function formatBytes(b) {
  if (!b) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
var toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 4000);
}
